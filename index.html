<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة زفاف اسلام وميار</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#000,#1a1a1a);
  color:white;
  text-align:center;
}

.container{
  padding:20px;
  animation: fadeIn 2s ease;
}

.title{
  font-size:32px;
  color:gold;
  margin-top:20px;
}

.subtitle{
  opacity:0.8;
}

.main-img{
  width:85%;
  border-radius:20px;
  margin:20px 0;
  box-shadow:0 10px 40px rgba(255,215,0,0.2);
}

.countdown{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:20px 0;
}

.countdown div{
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:10px;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:gold;
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1 class="title">💍 Islam & Mayar 💍</h1>

  <img src="couple.jpg" class="main-img" />

  <p class="subtitle">دعوة زفاف</p>

  <div class="countdown">
    <div><span id="days">0</span><p>يوم</p></div>
    <div><span id="hours">0</span><p>ساعة</p></div>
    <div><span id="minutes">0</span><p>دقيقة</p></div>
    <div><span id="seconds">0</span><p>ثانية</p></div>
  </div>

  <button id="musicBtn">🎵 تشغيل الموسيقى</button>
</div>

<audio id="music" preload="auto" loop playsinline>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// 🎵 تشغيل الموسيقى (حل مشكلة الموبايل)
const music = document.getElementById("music");
const btn = document.getElementById("musicBtn");

btn.addEventListener("click", async () => {
  try {
    if (music.paused) {
      await music.play();
      btn.textContent = "⏸️ إيقاف الموسيقى";
    } else {
      music.pause();
      btn.textContent = "🎵 تشغيل الموسيقى";
    }
  } catch (e) {
    btn.textContent = "اضغط مرة تانية 🎵";
  }
});

// ⏳ العد التنازلي
const weddingDate = new Date("2026-06-02").getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const distance = weddingDate - now;

  document.getElementById("days").textContent = Math.floor(distance/(1000*60*60*24));
  document.getElementById("hours").textContent = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
  document.getElementById("minutes").textContent = Math.floor((distance%(1000*60*60))/(1000*60));
  document.getElementById("seconds").textContent = Math.floor((distance%(1000*60))/1000);
},1000);
</script>

</body>
</html>
